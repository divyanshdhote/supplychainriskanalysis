services:

  # ── PostgreSQL Database ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: supply_chain_db
    environment:
      POSTGRES_DB: supply_chain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      # Named volume keeps data between restarts
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d supply_chain"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supply_chain_net

  # ── Spring Boot Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend/riskanalysis
      dockerfile: Dockerfile
    container_name: supply_chain_backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: supply_chain
      DB_USER: postgres
      DB_PASSWORD: postgres
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy   # wait until PostgreSQL is ready
    ports:
      - "8080:8080"                  # exposed for direct API testing if needed
    networks:
      - supply_chain_net

  # ── React / Nginx Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/risk-frontend
      dockerfile: Dockerfile
    container_name: supply_chain_frontend
    ports:
      - "3000:80"                    # access the app at http://localhost:3000
    depends_on:
      - backend
    networks:
      - supply_chain_net

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  supply_chain_net:
    driver: bridge
